apiVersion: v1
kind: Namespace
metadata:
  name: fixme
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixme-api
  namespace: fixme
  labels:
    app.kubernetes.io/name: fixme-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fixme-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fixme-api
    spec:
      containers:
        - name: api
          image: fixme-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DOTNET_ENVIRONMENT
              value: Production
            - name: FIXME_API_URL
              value: http://*:8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fixme-api
  namespace: fixme
  labels:
    app.kubernetes.io/name: fixme-api
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: fixme-api
  ports:
    - name: http
      port: 80
      targetPort: http
