services:
  api:
    build:
      context: .
      dockerfile: Containerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      FIXME_API_URL: http://*:8080
    ports:
      - "8080:8080"

  seq:
    image: docker.io/datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data

volumes:
  seq-data:
